<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Podstrona 4 — Kontakt</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Kontakt</h1>
    </header>

    <main>
      <p>Masz pytania lub chcesz nawiązać współpracę? Napisz lub skorzystaj z poniższych danych kontaktowych.</p>

      <section>
        <h2>Dane kontaktowe</h2>
        <p>Email: <a href="mailto:juliadarialew@wp.pl">juliadarialew@wp.pl</a></p>
        <p>Telefon: (opcjonalnie) wpisz numer</p>
      </section>

      <section>
        <h2>Formularz kontaktowy (przykład)</h2>
        <form action="#" method="post" style="max-width:100%; margin-top:1rem;">
          <label>
            Twoje imię<br>
            <input type="text" name="name" style="width:100%; box-sizing:border-box;">
          </label>
          <br><br>
          <label>
            Treść wiadomości<br>
            <textarea name="message" rows="6" style="width:100%; box-sizing:border-box;"></textarea>
          </label>
          <br><br>
          <button type="submit">Wyślij (demo)</button>
        </form>
      </section>

      <p style="margin-top:1.25rem;">
        <a href="index.html">◀ Powrót do strony głównej</a>
      </p>
    </main>

    <footer class="static-text">
      © Julia Lew
    </footer>
  </div>
</body>
</html>
