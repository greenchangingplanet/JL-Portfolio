<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prosta strona - obrazy jako linki</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      font-family: system-ui, Arial, sans-serif;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 28px;
      box-sizing: border-box;
      text-align: center;
    }

    /* kontener elementu (pozwala kontrolować, kiedy link jest interaktywny) */
    .item {
      position: relative;
      width: 320px;
      max-width: 90%;
      display: block;
      outline: none; /* focus styling poniżej */
    }

    /* domyślnie linki wewnątrz .item nie reagują na klik (stan "nie-link") */
    .item > a.img-wrap {
      pointer-events: none;
    }
    /* po hover/focus na kontenerze aktywujemy link (staje się klikalny) */
    .item:hover > a.img-wrap,
    .item:focus > a.img-wrap,
    .item:focus-within > a.img-wrap {
      pointer-events: auto;
    }

    /* Link-wrappers / button wrappers dla obrazków */
    a.img-wrap,
    button.img-wrap {
      display: block;
      width: 100%;
      text-decoration: none;
      color: inherit;
      position: relative;  /* potrzebne dla absolutnego hover obrazka */
      overflow: hidden;
      border-radius: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    /* Obrazy normal/hover */
    .img-wrap img.normal {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      transition: opacity .25s ease-in-out;
      opacity: 1;
      z-index: 1;
    }

    .img-wrap img.hover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity .25s ease-in-out;
      pointer-events: none;
      z-index: 2;
    }

    /* Przy hover/focus kontenera: hover pojawia się, normal zanika */
    .item:hover .img-wrap img.hover,
    .item:focus .img-wrap img.hover,
    .item:focus-within .img-wrap img.hover {
      opacity: 1;
    }

    .item:hover .img-wrap img.normal,
    .item:focus .img-wrap img.normal,
    .item:focus-within .img-wrap img.normal {
      opacity: 0;
    }

    /* Pierwszy obrazek (bez .item) - klikalny od razu */
    .single-link.img-wrap {
      pointer-events: auto;
    }

    /* Widoczny fokus dla dostępności */
    .item:focus {
      box-shadow: 0 0 0 4px rgba(21,156,228,0.12);
      border-radius: 6px;
    }
    a.img-wrap:focus,
    button.img-wrap:focus {
      box-shadow: 0 0 0 4px rgba(21,156,228,0.25);
      outline: none;
    }

    /* Potwierdzenie skopiowania */
    .copied-msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease-in-out;
      z-index: 10;
      white-space: nowrap;
    }
    .copied-msg.show { opacity: 1; }

    /* statyczny napis (element 6) */
    .static-text {
      width: 320px;
      max-width: 90%;
      color: #111;
      font-size: 18px;
    }

    p { margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- 1) Pierwszy obrazek: statyczny, link do strony głównej -->
    <a class="single-link img-wrap" href="/" aria-label="Strona główna">
      <img class="normal single-img" src="images/logo-glowne.png" alt="Obraz 1 - statyczny">
    </a>

    <!-- 2) Obrazek: hover zmienia obraz na inny, a wtedy link staje się aktywny (href zachowany) -->
    <div class="item" tabindex="0" aria-label="Element 2 - najedź, aby aktywować link">
      <a class="img-wrap" href="subpage2.html" aria-label="Przejdź do podstrony 2">
        <img class="normal" src="images/menu/o_mnie_image.png" alt="Obraz 2 - normalny">
        <img class="hover" src="images/menu/O_mnie_hover.png" alt="Obraz 2 - wersja po najechaniu">
      </a>
    </div>

    <!-- 3) Obrazek: jak wyżej, link aktywny po hover/focus -->
    <div class="item" tabindex="0" aria-label="Element 3 - najedź, aby aktywować link">
      <a class="img-wrap" href="subpage3.html" aria-label="Przejdź do podstrony 3">
        <img class="normal" src="images/menu/p_przyrodnicze_image.png" alt="Obraz 3 - normalny">
        <img class="hover" src="images/menu/przyrodnicze_hover.png" alt="Obraz 3 - wersja po najechaniu">
      </a>
    </div>

    <!-- 4) Obrazek: jak 2/3, link do subpage4 aktywuje się po hover/focus -->
    <div class="item" tabindex="0" aria-label="Element 4 - najedź, aby aktywować link">
      <a class="img-wrap" href="subpage4.html" aria-label="Przejdź do podstrony 4">
        <img class="normal" src="images/menu/Kontakt_image.png" alt="Obraz 4 - normalny">
        <img class="hover" src="images/menu/kontakt_hover.png" alt="Obraz 4 - wersja po najechaniu">
      </a>
    </div>

    <!-- 5) Obrazek: animowany GIF; kliknięcie kopiuje email -->
    <div class="item" tabindex="0" aria-label="Element 5 - najedź, aby aktywować; klik skopiuje email">
  <a class="img-wrap" href="#" data-email="kontakt@example.com" aria-label="Kliknij, aby skopiować adres email">
    <img class="normal" src="images/menu/zlecenia_image.gif" alt="Obraz 5 - animowany GIF">
    <img class="hover" src="images/menu/Contact_image.png alt="Obraz 5 - wersja po najechaniu - kliknij aby skopiować email">
    <span class="copied-msg" aria-hidden="true">Skopiowano</span>
  </a>
</div>

    <!-- 6) Statyczny napis (element 6) -->
    <div class="static-text" role="status" aria-label="Końcowy napis">
      Copyright Julia Lew
    </div>
  </div>

  <script>
    // Kopiowanie adresu email po kliknięciu przycisku .copy-btn
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const email = btn.dataset.email;
        if (!email) return;

        try {
          await navigator.clipboard.writeText(email);
          const msg = btn.querySelector('.copied-msg');
          if (msg) {
            msg.textContent = 'Skopiowano: ' + email;
            msg.classList.add('show');
            setTimeout(() => msg.classList.remove('show'), 2000);
          } else {
            alert('Skopiowano: ' + email);
          }
        } catch (err) {
          console.error('Kopiowanie nie powiodło się', err);
          alert('Nie udało się skopiować adresu. Proszę skopiować ręcznie: ' + email);
        }
      });

      // dostępność: Enter/Space
      btn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          btn.click();
        }
      });
    });

    // Przy focusie kontenera .item przenieś focus na link/btn wewnątrz (ułatwia klawiaturze)
    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('focus', () => {
        const inner = item.querySelector('a.img-wrap, button.img-wrap');
        if (inner) inner.focus({preventScroll: true});
      });
      item.addEventListener('blur', () => {
        const inner = item.querySelector('a.img-wrap, button.img-wrap');
        if (inner) inner.blur();
      });
    });
  </script>
</body>
</html>
