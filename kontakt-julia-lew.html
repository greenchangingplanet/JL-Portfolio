<!doctype html>
<html lang="pl-PL">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kontakt - Julia Lew</title>
  <meta name="description" content="contact@julialew.pl">
  <link rel="icon" href="https://julialew.pl/wp-content/uploads/2026/02/Simple-logo-lew.png">
  <style>
    /* Minimalny styl dla statycznej strony */
    :root{--max-width:900px;}
    html,body{height:100%}
    body {
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color:#222;
      background:#fff;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    .site {
      max-width:var(--max-width);
      margin:0 auto;
      padding:3rem 1rem;
      text-align:center;
    }
    header{margin-bottom:1.5rem;}
    header .logo img{max-width:220px;height:auto;display:inline-block;}
    h1{font-size:1.5rem;margin:0 0 0.75rem;}
    .email{font-size:1.125rem;word-break:break-word}
    footer{margin-top:2.5rem;color:#666;font-size:0.9rem}
    a{color:inherit;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="site">
    <header>
      <a class="logo" href="https://julialew.pl/" rel="home" aria-label="Strona główna">
        <img src="https://julialew.pl/wp-content/uploads/2026/02/Logo-glowne-300x300.png" alt="Julia Lew">
      </a>
    </header>

    <main role="main">
      <h1>Kontakt</h1>
      <p class="email"><a href="mailto:contact@julialew.pl">contact@julialew.pl</a></p>
    </main>

    <footer>
      <p>© 2026 Julia Lew</p>
    </footer>
  </div>
</body>
</html>
